name: Build ZMK firmware (DYA Studio Sofle)

on:
  push:
    paths:
      - "config/**"
      - "build.yaml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone ZMK
        run: |
          git clone https://github.com/zmkfirmware/zmk.git --branch v0.3.0 --depth 1 zmk

      - name: Install west
        run: pip install west

      - name: Install Zephyr SDK
        run: |
          wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.1/zephyr-sdk-0.16.1_linux-x86_64.tar.xz
          tar -xf zephyr-sdk-0.16.1_linux-x86_64.tar.xz
          sudo mv zephyr-sdk-0.16.1 /opt/zephyr-sdk

      - name: West Init
        working-directory: zmk/app
        run: |
          west init -l .
          west update

      - name: Add user config
        run: |
          mkdir -p zmk/config
          cp -r config/* zmk/config/

      - name: Build left + NiceView
        working-directory: zmk/app
        run: |
          west build -s . -b eyelash_sofle_left -- -DSHIELD=nice_view -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"

      - name: Build right
        working-directory: zmk/app
        run: |
          west build -s . -b eyelash_sofle_right -- -DSHIELD=nice_view_custom -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"

      - name: Build settings reset
        working-directory: zmk/app
        run: |
          west build -s . -b eyelash_sofle_left -- -DSHIELD=settings_reset -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: zmk/app/build/zephyr/*.uf2
